# Same-Day Clearance stack: Temporal worker + FastAPI control plane + React web.
#
# Postgres is NOT run here — worker/api use the j24-pulse compose postgres
# (service "postgres" on the external "j24-pulse_default" network), in the
# dedicated "perishable" database. Connects to Temporal Cloud (TEMPORAL_* in .env).
#
# No host ports are published — to avoid clashing with j24-pulse / j24-store-vision
# / parallax. The web container (j24-clearance-web on the parallax_app network) is
# served under https://parallax.jumbotail.com/j24-clearance/ via the parallax
# nginx, and proxies its own /api/ to the FastAPI gateway.
#
#   docker compose up --build -d            # worker + api + web
#
# Env comes from .env (see .env.example). DATABASE_URL below overrides .env.

services:
  # --- Our worker + control-plane API (shared image) ------------------------
  worker:
    build: .
    image: perishable-offers:latest
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://aira:aira@postgres:5432/clearance
    command: ["python", "worker.py"]
    restart: unless-stopped
    networks:
      - default
      - pulsedb

  api:
    build: .
    image: perishable-offers:latest
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://aira:aira@postgres:5432/clearance
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - default
      - pulsedb

  web:
    build: ./web
    image: perishable-offers-web:latest
    container_name: j24-clearance-web
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default
      - parallax

networks:
  # Internal network for web -> api traffic.
  default:
  # j24-pulse's compose network, where its postgres service lives.
  pulsedb:
    external: true
    name: j24-pulse_default
  # parallax's compose network, so its nginx can proxy to j24-clearance-web.
  parallax:
    external: true
    name: parallax_app
