<svg viewBox="0 0 1180 860" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .lbl{font-size:12.5px;fill:#334155}
      .sub{font-size:11px;fill:#64748b}
      .box-title{font-size:15px;font-weight:600}
      .badge{font-size:10.5px;fill:#fff;font-weight:600}
      .edge{stroke:#475569;stroke-width:1.6;fill:none}
      .edgeDash{stroke:#94a3b8;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
      .edgelbl{font-size:10.5px;fill:#475569}
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="860" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#0f172a">Same-Day Perishables Clearance — v3</text>
  <text x="40" y="62" class="sub" font-size="12.5">Per-batch decision ownership · shared per-facility read-model · profile-aware projection</text>

  <!-- Morning schedule -->
  <rect x="40" y="84" width="1100" height="52" rx="9" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="107" class="box-title" fill="#3730a3">Morning Schedule (per facility)</text>
  <text x="60" y="125" class="sub">discover L=1 leafy candidates → start ONE poller + one markdown workflow per (store, jpin, receipt_date)</text>

  <!-- Facility poller -->
  <rect x="40" y="188" width="360" height="150" rx="11" fill="#ecfeff" stroke="#67e8f9"/>
  <rect x="40" y="188" width="360" height="30" rx="11" fill="#06b6d4"/>
  <rect x="40" y="205" width="360" height="13" fill="#06b6d4"/>
  <text x="58" y="208" class="badge">FacilitySellThroughPoller · 1 per facility</text>
  <text x="58" y="244" class="lbl" font-weight="600">durable timer loop</text>
  <text x="58" y="264" class="sub">poll_facility_snapshot: ONE batched</text>
  <text x="58" y="280" class="sub">OUTWARDED scan for all K JPINs</text>
  <text x="58" y="300" class="sub">→ writes snapshot · continue_as_new</text>
  <text x="58" y="324" class="sub" font-style="italic">no decisions here — data only</text>

  <!-- Markdown workflow -->
  <rect x="720" y="188" width="420" height="330" rx="11" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="720" y="188" width="420" height="30" rx="11" fill="#2563eb"/>
  <rect x="720" y="205" width="420" height="13" fill="#2563eb"/>
  <text x="738" y="208" class="badge">PerishableMarkdownWorkflow · 1 per batch</text>
  <text x="738" y="242" class="lbl" font-weight="600">observe → decide → ask → apply → learn</text>

  <!-- inner steps -->
  <rect x="738" y="256" width="384" height="26" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="750" y="273" class="sub">read_snapshot  (activity · ~1ms, direct-read fallback)</text>

  <!-- determinism boundary -->
  <rect x="734" y="290" width="392" height="150" rx="9" fill="none" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="6 4"/>
  <rect x="734" y="290" width="150" height="18" rx="6" fill="#f59e0b"/>
  <text x="742" y="303" class="badge" font-size="10">DETERMINISM BOUNDARY</text>

  <rect x="748" y="316" width="364" height="26" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="760" y="333" class="sub">resolve_intraday_profile  (activity → shares)</text>
  <rect x="748" y="348" width="364" height="26" rx="6" fill="#fef9c3" stroke="#fde68a"/>
  <text x="760" y="365" class="sub" font-weight="600">project_remaining_demand()  — PURE (rate ⊕ pace)</text>
  <rect x="748" y="380" width="364" height="26" rx="6" fill="#fef9c3" stroke="#fde68a"/>
  <text x="760" y="397" class="sub" font-weight="600">decide_v3()  — PURE (floor · step · hysteresis)</text>
  <text x="760" y="424" class="sub" font-style="italic" fill="#b45309">same inputs → same price → replay = audit</text>

  <rect x="738" y="452" width="384" height="52" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="750" y="472" class="sub">apply_price_goldeneye (idempotent on run_id,seq)</text>
  <text x="750" y="490" class="sub">→ shape_offer_llm → publish_offer → write_audit</text>

  <!-- Postgres read-model -->
  <rect x="452" y="300" width="236" height="86" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="470" y="326" class="box-title" fill="#166534">Postgres read-model</text>
  <text x="470" y="346" class="sub">sell_through_snapshot</text>
  <text x="470" y="363" class="sub">(facility, jpin, date) — last write wins</text>
  <text x="470" y="379" class="sub">+ price ledger · decisions · audit</text>

  <!-- Profile artifact -->
  <rect x="452" y="560" width="236" height="80" rx="10" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="470" y="586" class="box-title" fill="#6b21a8">Intraday profile</text>
  <text x="470" y="606" class="sub">forecast-hourly → share curve</text>
  <text x="470" y="623" class="sub">per store×item×dow (Σ=1)</text>
  <text x="470" y="638" class="sub" font-style="italic">synthetic fallback if absent</text>

  <!-- Bolt gateway -->
  <rect x="40" y="410" width="360" height="90" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="58" y="438" class="box-title" fill="#334155">Bolt Gateway</text>
  <text x="58" y="458" class="sub">Inventory Item Details API</text>
  <text x="58" y="475" class="sub">OUTWARDED sell-through · active on-hand</text>
  <text x="58" y="492" class="sub" font-weight="600" fill="#0f766e">real  |  tools/mock_bolt.py (stateful)</text>

  <!-- Sinks -->
  <rect x="720" y="560" width="420" height="80" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="738" y="586" class="box-title" fill="#991b1b">Write path</text>
  <text x="738" y="606" class="sub">Golden Eye (price)  ·  My J24 (owner approval)</text>
  <text x="738" y="623" class="sub">Retail media / POS second screen  ·  S3 audit</text>

  <!-- EDGES -->
  <!-- schedule -> poller -->
  <path class="edge" d="M170,136 L200,188" marker-end="url(#arrow)"/>
  <!-- schedule -> workflow -->
  <path class="edge" d="M960,136 L930,188" marker-end="url(#arrow)"/>
  <!-- poller -> bolt (batched scan) -->
  <path class="edge" d="M220,338 L220,410" marker-end="url(#arrow)"/>
  <text x="230" y="378" class="edgelbl">O(K) batched</text>
  <text x="230" y="392" class="edgelbl">scans / tick</text>
  <!-- poller -> DB (writes) -->
  <path class="edge" d="M400,300 C430,290 440,320 452,330" marker-end="url(#arrow)"/>
  <text x="404" y="286" class="edgelbl">writes</text>
  <!-- DB -> workflow (reads) -->
  <path class="edge" d="M688,332 C705,320 715,300 738,290" marker-end="url(#arrow)"/>
  <text x="646" y="300" class="edgelbl">reads (~1ms)</text>
  <!-- profile -> workflow (shape) -->
  <path class="edge" d="M688,588 C820,588 820,392 748,360" marker-end="url(#arrow)"/>
  <text x="700" y="470" class="edgelbl">shape</text>
  <!-- workflow -> sinks -->
  <path class="edge" d="M930,504 L930,560" marker-end="url(#arrow)"/>
  <text x="938" y="536" class="edgelbl">apply · publish</text>
  <!-- workflow direct-read fallback -> bolt -->
  <path class="edgeDash" d="M738,268 C520,250 300,300 300,410" marker-end="url(#arrowDash)"/>
  <text x="430" y="250" class="edgelbl" fill="#94a3b8">direct-read fallback (snapshot stale)</text>

  <!-- key insight footer -->
  <rect x="40" y="700" width="1100" height="120" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="60" y="726" font-size="13.5" font-weight="700" fill="#0f172a">Why this shape</text>
  <text x="60" y="748" class="sub">• Decisions stay in ONE workflow per batch — correlation of a price change to its trigger, and replay-based audit, come for free.</text>
  <text x="60" y="768" class="sub">• Only the READS are decoupled: O(N·K) duplicated slow OUTWARDED scans → O(K) batched scans per tick (fixes the latency P0).</text>
  <text x="60" y="788" class="sub">• Projection = observed sell-through for the LEVEL ⊕ hourly profile for the SHAPE → holds through the 4pm trough before the evening peak.</text>
  <text x="60" y="808" class="sub">• Profile shares resolve in an activity and pass PURE into project/decide → determinism preserved, ships behind PROJECTION_MODE=v3|v2.</text>
</svg>
